<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>복남 헬스 플랜</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #fff; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

  /* 탭 */
  .tab-bar { display: flex; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; }
  .tab-btn { flex: 1; padding: 14px 0; text-align: center; font-size: 14px; font-weight: 600; color: #666; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #00c6ff; border-bottom-color: #00c6ff; }

  /* 헤더 */
  .header { background: #1a1a1a; padding: 20px 16px 16px; text-align: center; border-bottom: 1px solid #2a2a2a; }
  .header .date { font-size: 13px; color: #888; margin-bottom: 4px; }
  .header .day-title { font-size: 22px; font-weight: 700; }
  .header .day-sub { font-size: 14px; color: #888; margin-top: 4px; }

  .progress-bar { height: 4px; background: #2a2a2a; }
  .progress-fill { height: 4px; background: linear-gradient(90deg, #00c6ff, #0072ff); transition: width 0.4s; }

  .section { margin: 16px 12px 0; }
  .section-title { font-size: 12px; color: #888; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding-left: 4px; }

  .exercise-card { background: #1a1a1a; border-radius: 14px; padding: 16px; margin-bottom: 10px; border: 1.5px solid #2a2a2a; transition: border-color 0.2s; }
  .exercise-card.done { border-color: #00c6ff44; background: #00c6ff08; }
  .ex-top { display: flex; align-items: center; justify-content: space-between; }
  .ex-name { font-size: 16px; font-weight: 600; }
  .ex-done-badge { font-size: 12px; color: #00c6ff; font-weight: 700; display: none; }
  .exercise-card.done .ex-done-badge { display: block; }
  .exercise-card.done .ex-name { color: #555; }
  .ex-info { font-size: 12px; color: #666; margin-top: 4px; }

  .sets-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .set-btn { width: 44px; height: 44px; border-radius: 10px; border: 2px solid #333; background: #222; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .set-btn:active { transform: scale(0.92); }
  .set-btn.completed { background: #00c6ff22; border-color: #00c6ff; color: #00c6ff; }
  .set-btn.completed::after { content: '✓'; }
  .set-btn.completed span { display: none; }

  .rest-day { text-align: center; padding: 60px 20px; }
  .rest-day .icon { font-size: 60px; margin-bottom: 16px; }
  .rest-day h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .rest-day p { color: #888; font-size: 14px; line-height: 1.6; }

  .complete-banner { background: linear-gradient(135deg, #00c6ff22, #0072ff22); border: 1.5px solid #00c6ff55; border-radius: 14px; padding: 20px; text-align: center; margin: 16px 12px; display: none; }
  .complete-banner.show { display: block; }
  .complete-banner h3 { font-size: 18px; font-weight: 700; color: #00c6ff; }
  .complete-banner p { font-size: 13px; color: #888; margin-top: 6px; }

  .bottom-space { height: 40px; }

  /* 캘린더 */
  .calendar-wrap { padding: 16px 12px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav button { background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .cal-nav .cal-month { font-size: 18px; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 11px; color: #666; padding: 4px 0; font-weight: 600; }
  .cal-dow:first-child { color: #ff6b6b; }
  .cal-dow:last-child { color: #5b8fff; }
  .cal-cell { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: #1a1a1a; border: 1.5px solid transparent; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .cal-cell:active { transform: scale(0.93); }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.today { border-color: #00c6ff; }
  .cal-cell.selected { background: #00c6ff22; border-color: #00c6ff; }
  .cal-cell.rest-type { opacity: 0.4; }
  .cal-cell .cal-num { font-size: 14px; font-weight: 600; }
  .cal-cell.sun .cal-num { color: #ff6b6b; }
  .cal-cell.sat .cal-num { color: #5b8fff; }
  .cal-cell .cal-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 3px; }
  .cal-cell .cal-dot.completed { background: #00c6ff; }
  .cal-cell .cal-dot.workout { background: #333; }
  .cal-cell .cal-dot.partial { background: #f59e0b; }

  /* 캘린더 하단 선택 날짜 운동 요약 */
  .cal-detail { margin: 16px 0 0; background: #1a1a1a; border-radius: 14px; padding: 16px; border: 1.5px solid #2a2a2a; }
  .cal-detail h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .cal-detail-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
  .cal-detail-item:last-child { border-bottom: none; }
  .cal-detail-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .cal-detail-dot.done { background: #00c6ff; }
  .cal-detail-name { font-size: 14px; flex: 1; }
  .cal-detail-sets { font-size: 12px; color: #666; }
  .cal-detail-sets.done { color: #00c6ff; }

  /* 휴식 타이머 오버레이 */
  .timer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .timer-overlay.hidden { display: none; }
  .timer-title { font-size: 14px; color: #888; margin-bottom: 6px; letter-spacing: 1px; }
  .timer-exname { font-size: 20px; font-weight: 700; margin-bottom: 32px; }
  .timer-circle-wrap { position: relative; width: 180px; height: 180px; margin-bottom: 32px; }
  .timer-svg { transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: #222; stroke-width: 10; }
  .timer-prog { fill: none; stroke: #00c6ff; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-sec { font-size: 52px; font-weight: 800; line-height: 1; }
  .timer-label { font-size: 13px; color: #888; margin-top: 4px; }
  .timer-skip { background: #1a1a1a; border: 1.5px solid #333; color: #fff; padding: 14px 40px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .timer-skip:active { transform: scale(0.95); }
</style>
</head>
<body>
<!-- 휴식 타이머 오버레이 -->
<div class="timer-overlay hidden" id="timerOverlay">
  <div class="timer-title">🛑 세트 완료 · 휴식 시간</div>
  <div class="timer-exname" id="timerExName"></div>
  <div class="timer-circle-wrap">
    <svg class="timer-svg" width="180" height="180" viewBox="0 0 180 180">
      <circle class="timer-track" cx="90" cy="90" r="80"/>
      <circle class="timer-prog" id="timerProg" cx="90" cy="90" r="80"/>
    </svg>
    <div class="timer-num">
      <div class="timer-sec" id="timerSec">90</div>
      <div class="timer-label">초</div>
    </div>
  </div>
  <button class="timer-skip" onclick="skipTimer()">건너뛰기</button>
</div>

<div id="app"></div>

<script>
const PLAN = {
  1: { title: '가슴 + 어깨', emoji: '💪', color: '#00c6ff', exercises: [
    { name: '벤치프레스', sets: 4, reps: '10회', tip: '빈 바(20kg)부터 시작. 등 살짝 아치, 견갑골 모아서', rest: 90 },
    { name: '인클라인 덤벨프레스', sets: 3, reps: '12회', tip: '8~10kg 덤벨. 45도 각도 벤치', rest: 90 },
    { name: '사이드 레터럴 레이즈', sets: 4, reps: '15회', tip: '5~6kg. 어깨 넓히기 핵심 운동!', rest: 60 },
    { name: '프론트 레이즈', sets: 3, reps: '12회', tip: '5kg. 팔꿈치 살짝 구부린 채로', rest: 60 },
  ]},
  2: { title: '등 + 이두', emoji: '🔙', color: '#7c3aed', exercises: [
    { name: '랫풀다운', sets: 4, reps: '10회', tip: '가슴 쪽으로 당기기. 턱걸이 대체 운동', rest: 90 },
    { name: '시티드 로우', sets: 3, reps: '12회', tip: '허리 세우고 배꼽 쪽으로 당기기', rest: 90 },
    { name: '덤벨 컬', sets: 3, reps: '15회', tip: '반동 금지. 팔꿈치 고정', rest: 60 },
  ]},
  3: { rest: true },
  4: { title: '어깨 + 삼두', emoji: '🏋️', color: '#f59e0b', exercises: [
    { name: '덤벨 숄더프레스', sets: 4, reps: '10회', tip: '귀 옆에서 시작해서 위로. 허리 반동 금지', rest: 90 },
    { name: '사이드 레터럴 레이즈', sets: 4, reps: '15회', tip: '어깨 넓히기 핵심! 주 2회 필수', rest: 60 },
    { name: '리어 델트 플라이', sets: 3, reps: '15회', tip: '앞으로 숙여서 뒤로 벌리기. 어깨 입체감', rest: 60 },
    { name: '케이블 푸시다운', sets: 3, reps: '12회', tip: '팔꿈치 고정. 아래로 쭉 펴기', rest: 60 },
  ]},
  5: { rest: true },
  6: { title: '하체 + 허리 + 복근', emoji: '🦵', color: '#10b981', exercises: [
    { name: '레그프레스', sets: 4, reps: '12회', tip: '무릎이 발끝 넘지 않게. 엉덩이 들리면 안 됨', rest: 90 },
    { name: '레그 익스텐션', sets: 3, reps: '15회', tip: '허벅지 앞쪽 고립. 천천히 내리기', rest: 60 },
    { name: '레그 컬', sets: 3, reps: '15회', tip: '허벅지 뒤쪽. 골반 고정', rest: 60 },
    { name: '루마니안 데드리프트', sets: 3, reps: '12회', tip: '허리 곧게! 엉덩이 뒤로 빼면서 내리기. 허리 강화 핵심', rest: 90 },
    { name: '백 익스텐션', sets: 3, reps: '15회', tip: '허리 기립근 강화. 오래 걸어도 안 아프게', rest: 60 },
    { name: '플랭크', sets: 3, reps: '1분', tip: '코어 수축. 엉덩이 내려가지 않게', rest: 60 },
  ]},
  0: { rest: true }
};

const WARMUP = [
  { name: '고양이-소 스트레칭', duration: '1분', tip: '척추 풀기. 천천히 호흡하면서' },
  { name: '햄스트링 스트레칭', duration: '1분', tip: '허리 당김 해소' },
  { name: '흉추 회전 스트레칭', duration: '1분', tip: '뻣뻣한 등 풀기' },
  { name: '트레드밀 워킹', duration: '7분', tip: '가볍게 걷기. 몸 깨우기' },
];
const COOLDOWN = [
  { name: '가슴 스트레칭', duration: '30초', tip: '벽에 손 짚고 몸 돌리기' },
  { name: '어깨 교차 스트레칭', duration: '30초', tip: '팔 가슴 앞으로 당기기' },
  { name: '고양이-소 스트레칭', duration: '1분', tip: '운동 후 척추 정리' },
  { name: '허리 돌리기', duration: '1분', tip: '앉아서 좌우로 천천히' },
];

const realToday = new Date();
const todayStr = realToday.toISOString().slice(0,10);

// 현재 탭: 'today' | 'calendar'
let currentTab = 'today';
// 오늘 기준 선택 날짜
let selectedDate = todayStr;
// 달력 표시 년월
let calYear = realToday.getFullYear();
let calMonth = realToday.getMonth();

function getStorageKey(dateStr) { return `workout_${dateStr}`; }

function getState(dateStr) {
  return JSON.parse(localStorage.getItem(getStorageKey(dateStr)) || 'null') || {
    warmup: new Array(WARMUP.length).fill(false),
    sets: {},
    cooldown: new Array(COOLDOWN.length).fill(false),
  };
}

function saveState(dateStr, state) {
  localStorage.setItem(getStorageKey(dateStr), JSON.stringify(state));
}

function getDayOfWeek(dateStr) {
  return new Date(dateStr + 'T00:00:00').getDay();
}

function getTotalSets(dow) {
  const plan = PLAN[dow];
  if (!plan || plan.rest) return 0;
  return plan.exercises.reduce((a, e) => a + e.sets, 0);
}

function getDoneSetsFromState(dow, state) {
  let done = 0;
  const plan = PLAN[dow];
  if (!plan || plan.rest) return 0;
  plan.exercises.forEach((ex, ei) => {
    for (let s = 0; s < ex.sets; s++) {
      if (state.sets[`${ei}_${s}`]) done++;
    }
  });
  return done;
}

// 날짜 상태: 'completed' | 'partial' | 'workout' | 'rest'
function getDayStatus(dateStr) {
  const dow = getDayOfWeek(dateStr);
  const plan = PLAN[dow];
  if (!plan || plan.rest) return 'rest';
  const total = getTotalSets(dow);
  const state = getState(dateStr);
  const done = getDoneSetsFromState(dow, state);
  if (done === 0) return 'workout';
  if (done >= total) return 'completed';
  return 'partial';
}

function formatDateKo(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'long' });
}

// ===== 렌더 =====
function render() {
  let html = '';
  html += `<div class="tab-bar">
    <div class="tab-btn ${currentTab==='today'?'active':''}" onclick="switchTab('today')">오늘 운동</div>
    <div class="tab-btn ${currentTab==='calendar'?'active':''}" onclick="switchTab('calendar')">📅 달력</div>
  </div>`;

  if (currentTab === 'today') {
    html += renderWorkout(todayStr);
  } else {
    html += renderCalendar();
  }

  html += `<div class="bottom-space"></div>`;
  document.getElementById('app').innerHTML = html;
}

function renderWorkout(dateStr) {
  const dow = getDayOfWeek(dateStr);
  const plan = PLAN[dow];
  const state = getState(dateStr);
  const isToday = dateStr === todayStr;
  const totalSets = getTotalSets(dow);
  const doneSets = getDoneSetsFromState(dow, state);
  const allDone = totalSets > 0 && doneSets >= totalSets;
  const dateLabel = isToday ? realToday.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'long' }) : formatDateKo(dateStr);

  let html = '';
  html += `<div class="header">
    <div class="date">${dateLabel}</div>
    <div class="day-title">${plan && !plan.rest ? plan.emoji + ' ' + plan.title : '🛌 휴식일'}</div>
    ${!plan?.rest ? `<div class="day-sub">${doneSets} / ${totalSets} 세트 완료</div>` : ''}
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${totalSets>0?(doneSets/totalSets*100):0}%"></div></div>`;

  if (plan?.rest) {
    html += `<div class="rest-day"><div class="icon">🛌</div><h2>휴식일</h2><p>근육은 쉬는 동안 성장해.<br>충분한 수면과 단백질 섭취!</p></div>`;
  } else {
    html += `<div class="complete-banner ${allDone?'show':''}"><h3>💪 운동 완료!</h3><p>쿨다운까지 마무리하면 완벽해</p></div>`;

    html += `<div class="section"><div class="section-title">🔥 워밍업 (10분)</div>`;
    WARMUP.forEach((w, i) => {
      const done = state.warmup[i];
      html += `<div class="exercise-card ${done?'done':''}" onclick="toggleWarmup('${dateStr}',${i})">
        <div class="ex-top"><div class="ex-name">${w.name}</div><div class="ex-done-badge">완료</div></div>
        <div class="ex-info">${w.duration} · ${w.tip}</div>
      </div>`;
    });
    html += `</div>`;

    html += `<div class="section"><div class="section-title">💪 본 운동</div>`;
    plan.exercises.forEach((ex, ei) => {
      const doneSetsArr = Array.from({length: ex.sets}, (_, s) => state.sets[`${ei}_${s}`] || false);
      const exDone = doneSetsArr.every(Boolean);
      html += `<div class="exercise-card ${exDone?'done':''}">
        <div class="ex-top"><div class="ex-name">${ex.name}</div><div class="ex-done-badge">완료</div></div>
        <div class="ex-info">${ex.sets}세트 × ${ex.reps} · ${ex.tip}</div>
        <div class="sets-row">`;
      for (let s = 0; s < ex.sets; s++) {
        const done = state.sets[`${ei}_${s}`] || false;
        html += `<button class="set-btn ${done?'completed':''}" onclick="toggleSet('${dateStr}',${ei},${s})"><span>${s+1}</span></button>`;
      }
      html += `</div></div>`;
    });
    html += `</div>`;

    html += `<div class="section"><div class="section-title">❄️ 쿨다운 (5분)</div>`;
    COOLDOWN.forEach((c, i) => {
      const done = state.cooldown[i];
      html += `<div class="exercise-card ${done?'done':''}" onclick="toggleCooldown('${dateStr}',${i})">
        <div class="ex-top"><div class="ex-name">${c.name}</div><div class="ex-done-badge">완료</div></div>
        <div class="ex-info">${c.duration} · ${c.tip}</div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const dowLabels = ['일','월','화','수','목','금','토'];

  let html = `<div class="calendar-wrap">
    <div class="cal-nav">
      <button onclick="calPrev()">◀</button>
      <div class="cal-month">${calYear}년 ${monthNames[calMonth]}</div>
      <button onclick="calNext()">▶</button>
    </div>
    <div class="cal-grid">`;

  dowLabels.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });

  for (let i = 0; i < firstDay; i++) { html += `<div class="cal-cell empty"></div>`; }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(ds + 'T00:00:00').getDay();
    const status = getDayStatus(ds);
    const isToday = ds === todayStr;
    const isSelected = ds === selectedDate;
    const isSun = dow === 0;
    const isSat = dow === 6;
    const dotClass = status === 'completed' ? 'completed' : status === 'partial' ? 'partial' : status === 'workout' ? 'workout' : '';

    html += `<div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''} ${status==='rest'?'rest-type':''} ${isSun?'sun':''} ${isSat?'sat':''}" onclick="selectDate('${ds}')">
      <div class="cal-num">${d}</div>
      ${dotClass ? `<div class="cal-dot ${dotClass}"></div>` : '<div style="height:8px"></div>'}
    </div>`;
  }
  html += `</div>`;

  // 선택한 날짜 운동 요약
  const selDow = getDayOfWeek(selectedDate);
  const selPlan = PLAN[selDow];
  const selState = getState(selectedDate);
  const selDate = new Date(selectedDate + 'T00:00:00');
  const selLabel = selDate.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'long' });

  html += `<div class="cal-detail">
    <h3>${selLabel} ${selPlan && !selPlan.rest ? selPlan.emoji + ' ' + selPlan.title : '🛌 휴식일'}</h3>`;

  if (selPlan && !selPlan.rest) {
    selPlan.exercises.forEach((ex, ei) => {
      const doneSets = Array.from({length: ex.sets}, (_, s) => selState.sets[`${ei}_${s}`] || false).filter(Boolean).length;
      const exDone = doneSets === ex.sets;
      html += `<div class="cal-detail-item">
        <div class="cal-detail-dot ${exDone?'done':''}"></div>
        <div class="cal-detail-name">${ex.name}</div>
        <div class="cal-detail-sets ${exDone?'done':''}">${doneSets}/${ex.sets} 세트</div>
      </div>`;
    });

    // 선택 날짜가 오늘이면 바로가기 버튼
    if (selectedDate === todayStr) {
      html += `<div style="margin-top:12px;text-align:center">
        <button onclick="switchTab('today')" style="background:#00c6ff22;border:1px solid #00c6ff55;color:#00c6ff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">지금 운동 시작 →</button>
      </div>`;
    }
  } else {
    html += `<div style="color:#666;font-size:14px;padding:8px 0">오늘은 쉬어가는 날!</div>`;
  }

  html += `</div>`;

  // 범례
  html += `<div style="display:flex;gap:16px;padding:12px 4px;font-size:12px;color:#666;">
    <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:#00c6ff"></div>완료</div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:#f59e0b"></div>일부완료</div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:#333"></div>운동일</div>
  </div>`;

  html += `</div>`;
  return html;
}

function switchTab(tab) { currentTab = tab; render(); }
function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} render(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} render(); }
function selectDate(ds) { selectedDate = ds; render(); }

function toggleWarmup(dateStr, i) {
  const s = getState(dateStr); s.warmup[i] = !s.warmup[i]; saveState(dateStr, s); render();
}
function toggleSet(dateStr, ei, s) {
  const st = getState(dateStr);
  const key = `${ei}_${s}`;
  const wasOff = !st.sets[key];
  st.sets[key] = !st.sets[key];
  saveState(dateStr, st);
  render();
  // 세트 완료(체크) 시에만 타이머 시작
  if (wasOff) {
    const dow = getDayOfWeek(dateStr);
    const plan = PLAN[dow];
    if (plan && !plan.rest && plan.exercises[ei]) {
      const ex = plan.exercises[ei];
      // 마지막 세트면 타이머 안 띄움
      const allDone = Array.from({length: ex.sets}, (_, idx) => st.sets[`${ei}_${idx}`] || false).every(Boolean);
      if (!allDone) {
        startTimer(ex.name, ex.rest || 60);
      }
    }
  }
}
function toggleCooldown(dateStr, i) {
  const s = getState(dateStr); s.cooldown[i] = !s.cooldown[i]; saveState(dateStr, s); render();
}

// ===== 휴식 타이머 =====
let timerInterval = null;
let timerRemaining = 0;
const CIRCUMFERENCE = 2 * Math.PI * 80; // r=80

function startTimer(exName, seconds) {
  clearInterval(timerInterval);
  timerRemaining = seconds;
  document.getElementById('timerExName').textContent = exName;
  document.getElementById('timerOverlay').classList.remove('hidden');
  updateTimerUI(seconds, seconds);

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerUI(timerRemaining, seconds);
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      // 진동 알림
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      // 소리 알림
      playBeep();
      setTimeout(() => {
        document.getElementById('timerOverlay').classList.add('hidden');
      }, 800);
    }
  }, 1000);
}

function updateTimerUI(remaining, total) {
  document.getElementById('timerSec').textContent = remaining;
  const prog = document.getElementById('timerProg');
  prog.style.strokeDasharray = CIRCUMFERENCE;
  prog.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / total);
  // 색상 변화: 여유→노랑→빨강
  const ratio = remaining / total;
  const color = ratio > 0.5 ? '#00c6ff' : ratio > 0.25 ? '#f59e0b' : '#ff4444';
  prog.style.stroke = color;
}

function skipTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').classList.add('hidden');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.2);
    });
  } catch(e) {}
}

render();
</script>
